<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 1120" role="img" aria-labelledby="robotTitle robotDesc">
  <title id="robotTitle">Humanoid Robot</title>
  <desc id="robotDesc">Futuristic humanoid robot body with an open left palm.</desc>
  <defs>
    <linearGradient id="metalLight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f9ff"/>
      <stop offset="0.44" stop-color="#d6e1ec"/>
      <stop offset="0.72" stop-color="#8fa2b5"/>
      <stop offset="1" stop-color="#1b2938"/>
    </linearGradient>
    <linearGradient id="metalDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3a4c"/>
      <stop offset="0.55" stop-color="#111c28"/>
      <stop offset="1" stop-color="#071018"/>
    </linearGradient>
    <radialGradient id="tealCore" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#dbfbff"/>
      <stop offset="0.32" stop-color="#6FB3C8"/>
      <stop offset="0.7" stop-color="#1f4e5f"/>
      <stop offset="1" stop-color="#08131c"/>
    </radialGradient>
    <radialGradient id="floorShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="rgba(8,19,28,0.42)"/>
      <stop offset="1" stop-color="rgba(8,19,28,0)"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="26" stdDeviation="22" flood-color="#06131f" flood-opacity="0.35"/>
    </filter>
    <filter id="tealGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#6FB3C8" flood-opacity="0.9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#6FB3C8" flood-opacity="0.5"/>
    </filter>
  </defs>

  <ellipse cx="606" cy="1040" rx="174" ry="44" fill="url(#floorShadow)"/>

  <g filter="url(#softShadow)">
    <ellipse cx="582" cy="186" rx="122" ry="148" fill="url(#metalLight)"/>
    <ellipse cx="610" cy="197" rx="86" ry="114" fill="url(#metalDark)"/>
    <ellipse cx="644" cy="196" rx="42" ry="42" fill="url(#tealCore)" filter="url(#tealGlow)"/>
    <circle cx="644" cy="196" r="19" fill="none" stroke="#c8f6ff" stroke-width="3"/>
    <circle cx="644" cy="196" r="8" fill="#7fe0ff"/>

    <rect x="548" y="310" width="70" height="56" rx="26" fill="url(#metalLight)"/>

