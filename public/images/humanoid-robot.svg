    <path d="M507 508C522 486 548 480 570 492" stroke="#7edcff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M566 642C597 623 641 624 669 646" stroke="#7edcff" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <path d="M302 754C318 740 343 738 360 748" stroke="#7edcff" stroke-width="3" stroke-linecap="round" opacity="0.74"/>
