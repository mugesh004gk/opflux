    <path d="M502 416C529 373 589 352 646 359C704 366 746 404 757 454L763 580C761 648 717 708 649 731C576 712 532 660 531 594L502 416Z" fill="url(#metalDark)" opacity="0.9"/>
    <ellipse cx="598" cy="558" rx="92" ry="108" fill="url(#metalLight)" opacity="0.46"/>

    <circle cx="465" cy="462" r="78" fill="url(#metalLight)"/>
    <circle cx="718" cy="502" r="84" fill="url(#metalLight)"/>
    <circle cx="465" cy="462" r="26" fill="url(#tealCore)" filter="url(#tealGlow)"/>
    <circle cx="718" cy="502" r="30" fill="url(#tealCore)" filter="url(#tealGlow)"/>

